name: 🚀 Deploy a PythonAnywhere

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    name: Deploy a Produccion
    runs-on: ubuntu-latest

    steps:
      - name: 🔄 Git Pull en PythonAnywhere
        run: |
          echo "Actualizando código en PythonAnywhere..."
          # Crear consola bash
          CONSOLE=$(curl -s -X POST \
            -H "Authorization: Token ${{ secrets.PA_API_TOKEN }}" \
            -d "executable=bash&arguments=&working_directory=/home/Unidossis" \
            "https://www.pythonanywhere.com/api/v0/user/Unidossis/consoles/")
          
          CID=$(echo $CONSOLE | python3 -c "import sys,json; print(json.load(sys.stdin)['id'])")
          echo "Consola creada: $CID"
          
          # Esperar inicialización
          sleep 5
          
          # Enviar git pull
          curl -s -X POST \
            -H "Authorization: Token ${{ secrets.PA_API_TOKEN }}" \
            --data-urlencode "input=cd ~/unidossis-pqrs && git pull && echo DONE
" \
            "https://www.pythonanywhere.com/api/v0/user/Unidossis/consoles/$CID/send_input/"
          
          # Esperar ejecución
          sleep 12
          
          # Ver resultado
          curl -s \
            -H "Authorization: Token ${{ secrets.PA_API_TOKEN }}" \
            "https://www.pythonanywhere.com/api/v0/user/Unidossis/consoles/$CID/get_latest_output/"
          
          # Eliminar consola
          curl -s -X DELETE \
            -H "Authorization: Token ${{ secrets.PA_API_TOKEN }}" \
            "https://www.pythonanywhere.com/api/v0/user/Unidossis/consoles/$CID/"

      - name: 🔃 Recargar Web App
        run: |
          echo "Recargando aplicación web..."
          RESULT=$(curl -s -X POST \
            -H "Authorization: Token ${{ secrets.PA_API_TOKEN }}" \
            "https://www.pythonanywhere.com/api/v0/user/Unidossis/webapps/unidossis.pythonanywhere.com/reload/")
          echo "Resultado: $RESULT"
          echo "✅ Deploy completado — https://Unidossis.pythonanywhere.com"
