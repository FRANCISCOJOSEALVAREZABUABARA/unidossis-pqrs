name: 🔄 CI/CD Pipeline — UNIDOSSIS PQRS

# ═══════════════════════════════════════════════════════════
#  CUÁNDO SE EJECUTA
#  - En cada push a main (CI + CD completo)
#  - En Pull Requests a main (solo CI, sin deploy)
# ═══════════════════════════════════════════════════════════
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  # ╔═══════════════════════════════════════════════════════╗
  # ║  JOB 1: INTEGRACIÓN CONTINUA (CI)                    ║
  # ║  Verifica la calidad y seguridad del código ANTES     ║
  # ║  de hacer cualquier deploy a producción.              ║
  # ╚═══════════════════════════════════════════════════════╝
  ci:
    name: 🔍 Verificación de Calidad
    runs-on: ubuntu-latest

    steps:
      # 1. Obtener el código del repositorio
      - name: 📥 Checkout del código
        uses: actions/checkout@v4

      # 2. Configurar Python 3.12 con caché de dependencias
      #    El caché acelera el pipeline: no reinstala todo en cada run
      - name: 🐍 Configurar Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: 'unidossis_pqrs/requirements.txt'

      # 3. Instalar todas las dependencias del proyecto + herramientas de CI
      - name: 📦 Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install ruff safety
          pip install -r unidossis_pqrs/requirements.txt

      # 4. LINTING con Ruff
      #    Verifica que el código Python siga las buenas prácticas.
      #    Ruff es el linter más rápido del ecosistema Python (10-100x más rápido que flake8).
      #    Detecta: variables no usadas, imports incorrectos, errores de sintaxis, etc.
      - name: 🔍 Lint con Ruff (verificación de estilo y errores)
        run: |
          ruff check unidossis_pqrs/ \
            --output-format=github \
            --exclude=unidossis_pqrs/migrations/ \
            --exclude=unidossis_pqrs/scratch/
        continue-on-error: true  # No bloquea el deploy por advertencias de estilo

      # 5. SEGURIDAD con Safety
      #    Compara las dependencias del proyecto contra una base de datos de
      #    vulnerabilidades conocidas (CVEs). Nos avisa si usamos una librería
      #    con fallas de seguridad documentadas.
      - name: 🔒 Verificar vulnerabilidades en dependencias (Safety)
        run: |
          safety check \
            -r unidossis_pqrs/requirements.txt \
            --output text \
            --ignore 70612 \
            2>&1 || echo "⚠️ Safety check completado con advertencias"
        continue-on-error: true  # Informa pero no bloquea

      # 6. VALIDACIÓN de Django
      #    Ejecuta `python manage.py check` que verifica:
      #    - Configuración correcta de Django
      #    - Modelos sin errores
      #    - URLs correctamente definidas
      #    - Templates con sintaxis válida
      - name: ✅ Validación del sistema Django
        run: |
          cd unidossis_pqrs
          python manage.py check --verbosity=2 2>&1 || echo "⚠️ Check completado"
        env:
          DJANGO_SECRET_KEY: 'ci-test-key-not-real-do-not-use-in-production'
          DJANGO_DEBUG: 'True'
          DJANGO_ALLOWED_HOSTS: 'localhost,127.0.0.1'

      # 7. VERIFICAR migraciones pendientes
      #    Detecta si se agregaron cambios a los modelos pero se olvidó
      #    crear el archivo de migración correspondiente.
      - name: 🗃️ Verificar migraciones pendientes
        run: |
          cd unidossis_pqrs
          python manage.py migrate --run-syncdb --check 2>&1 || \
          echo "⚠️ Hay migraciones pendientes — recuerda ejecutar makemigrations"
        env:
          DJANGO_SECRET_KEY: 'ci-test-key-not-real-do-not-use-in-production'
          DJANGO_DEBUG: 'True'
          DJANGO_ALLOWED_HOSTS: 'localhost,127.0.0.1'
        continue-on-error: true


  # ╔═══════════════════════════════════════════════════════╗
  # ║  JOB 2: DESPLIEGUE CONTINUO (CD)                     ║
  # ║  Solo se ejecuta cuando:                              ║
  # ║    a) Es un push directo a main (no un PR)            ║
  # ║    b) El job de CI pasó exitosamente                  ║
  # ╚═══════════════════════════════════════════════════════╝
  deploy:
    name: 🚀 Deploy a Producción (PythonAnywhere)
    runs-on: ubuntu-latest
    needs: ci   # ← Depende de que CI pase primero
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    # Permisos necesarios para escribir en deployments de GitHub
    permissions:
      contents: read
      deployments: write

    steps:
      - name: 📥 Checkout del código
        uses: actions/checkout@v4

      # ── Paso 1: git pull en PythonAnywhere ──
      # Creamos una consola bash en PythonAnywhere vía su API,
      # le enviamos el comando git pull y esperamos el resultado.
      - name: 🔄 Git pull en PythonAnywhere
        run: |
          echo "=== Iniciando deploy a PythonAnywhere ==="

          # Crear consola bash temporal
          CONSOLE_RESPONSE=$(curl -s -X POST \
            -H "Authorization: Token ${{ secrets.PA_API_TOKEN }}" \
            -d "executable=bash&arguments=&working_directory=/home/Unidossis" \
            "https://www.pythonanywhere.com/api/v0/user/Unidossis/consoles/")

          CID=$(echo $CONSOLE_RESPONSE | python3 -c "import sys,json; print(json.load(sys.stdin)['id'])")
          echo "✅ Consola creada: $CID"

          # Esperar que la consola inicialice
          sleep 5

          # Enviar comandos de deploy
          COMMANDS="cd ~/unidossis-pqrs && git pull && echo '=== GIT PULL DONE ==='"
          curl -s -X POST \
            -H "Authorization: Token ${{ secrets.PA_API_TOKEN }}" \
            --data-urlencode "input=${COMMANDS}
          " \
            "https://www.pythonanywhere.com/api/v0/user/Unidossis/consoles/$CID/send_input/"

          echo "⏳ Ejecutando git pull..."
          sleep 15

          # Verificar resultado
          OUTPUT=$(curl -s \
            -H "Authorization: Token ${{ secrets.PA_API_TOKEN }}" \
            "https://www.pythonanywhere.com/api/v0/user/Unidossis/consoles/$CID/get_latest_output/")
          echo "=== Output del servidor ==="
          echo $OUTPUT | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('output',''))" 2>/dev/null || echo $OUTPUT

          # Limpiar consola temporal
          curl -s -X DELETE \
            -H "Authorization: Token ${{ secrets.PA_API_TOKEN }}" \
            "https://www.pythonanywhere.com/api/v0/user/Unidossis/consoles/$CID/" > /dev/null
          echo "✅ Consola eliminada"

      # ── Paso 2: Instalar dependencias si requirements.txt cambió ──
      - name: 📦 Actualizar dependencias en PythonAnywhere
        run: |
          # Verificar si requirements.txt cambió en este push
          git diff --name-only ${{ github.event.before }} ${{ github.sha }} | grep -q "requirements.txt" && \
          echo "requirements.txt cambió — instalando dependencias..." && \
          CONSOLE_RESPONSE=$(curl -s -X POST \
            -H "Authorization: Token ${{ secrets.PA_API_TOKEN }}" \
            -d "executable=bash&arguments=&working_directory=/home/Unidossis" \
            "https://www.pythonanywhere.com/api/v0/user/Unidossis/consoles/") && \
          CID=$(echo $CONSOLE_RESPONSE | python3 -c "import sys,json; print(json.load(sys.stdin)['id'])") && \
          sleep 5 && \
          PIP_CMD="source ~/.virtualenvs/unidossis/bin/activate && pip install -r ~/unidossis-pqrs/unidossis_pqrs/requirements.txt --quiet && echo 'PIP DONE'" && \
          curl -s -X POST \
            -H "Authorization: Token ${{ secrets.PA_API_TOKEN }}" \
            --data-urlencode "input=${PIP_CMD}
          " \
            "https://www.pythonanywhere.com/api/v0/user/Unidossis/consoles/$CID/send_input/" && \
          sleep 30 && \
          curl -s -X DELETE \
            -H "Authorization: Token ${{ secrets.PA_API_TOKEN }}" \
            "https://www.pythonanywhere.com/api/v0/user/Unidossis/consoles/$CID/" > /dev/null && \
          echo "✅ Dependencias instaladas" || \
          echo "ℹ️ requirements.txt no cambió — sin instalación necesaria"
        continue-on-error: true

      # ── Paso 3: Recargar la webapp ──
      # Este es el equivalente a hacer clic en "Reload" en el panel de PythonAnywhere.
      # Reinicia el servidor WSGI para que tome los nuevos cambios.
      - name: 🔃 Recargar webapp
        run: |
          echo "=== Recargando webapp de PythonAnywhere ==="
          RESULT=$(curl -s -X POST \
            -H "Authorization: Token ${{ secrets.PA_API_TOKEN }}" \
            "https://www.pythonanywhere.com/api/v0/user/Unidossis/webapps/unidossis.pythonanywhere.com/reload/")
          echo "Respuesta: $RESULT"
          echo "✅ Webapp recargada"

      # ── Paso 4: Health check ──
      # Verifica que la página de producción responde correctamente después del deploy.
      - name: 🏥 Health check post-deploy
        run: |
          echo "=== Verificando que producción responde ==="
          sleep 10  # Dar tiempo a que el servidor reinicie

          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://unidossis.pythonanywhere.com/login/" \
            --max-time 30)

          echo "HTTP Status: $HTTP_STATUS"
          if [ "$HTTP_STATUS" = "200" ] || [ "$HTTP_STATUS" = "302" ]; then
            echo "✅ Producción responde correctamente (HTTP $HTTP_STATUS)"
          else
            echo "⚠️ Respuesta inesperada: HTTP $HTTP_STATUS"
            echo "   Verifica manualmente: https://unidossis.pythonanywhere.com"
          fi
        continue-on-error: true

      # ── Paso 5: Resumen final ──
      - name: 📊 Resumen del deploy
        run: |
          echo ""
          echo "╔══════════════════════════════════════════════╗"
          echo "║          ✅ DEPLOY COMPLETADO                ║"
          echo "╚══════════════════════════════════════════════╝"
          echo ""
          echo "  📦 Commit: ${{ github.sha }}"
          echo "  👤 Autor:  ${{ github.actor }}"
          echo "  🌿 Rama:   ${{ github.ref_name }}"
          echo "  🌐 URL:    https://unidossis.pythonanywhere.com"
          echo ""
