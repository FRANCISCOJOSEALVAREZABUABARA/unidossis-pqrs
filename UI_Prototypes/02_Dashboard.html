<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>UNIDOSSIS - Dashboard</title>
    <link rel="stylesheet" href="shared.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <aside class="sidebar">
        <div class="brand">
            <img src="../unidossis_pqrs/tickets/static/tickets/img/Logo.svg" alt="UNIDOSSIS Logo">
        </div>
        <ul class="nav-links">
            <a href="#" class="nav-item"><i data-lucide="inbox"></i> Bandeja PQRS</a>
            <a href="#" class="nav-item active"><i data-lucide="bar-chart-2"></i> Analytics</a>
        </ul>
    </aside>
    <main class="main-content">
        <header class="topbar">
            <h3 style="font-weight: 600;">Inteligencia Analítica</h3>
        </header>
        <div class="page-content">
            <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.5rem; margin-bottom: 2rem;">
                <div class="card" style="display: flex; flex-direction: column; gap: 8px;">
                    <div style="color: var(--text-muted); font-size: 0.9rem; font-weight: 500;">Total Abiertos</div>
                    <div style="font-size: 2.5rem; font-weight: 700; color: var(--primary);">42</div>
                    <div style="font-size: 0.8rem; color: #166534; font-weight: 500;">+12% esta semana</div>
                </div>
                <div class="card" style="display: flex; flex-direction: column; gap: 8px;">
                    <div style="color: var(--text-muted); font-size: 0.9rem; font-weight: 500;">SLA Vencido</div>
                    <div style="font-size: 2.5rem; font-weight: 700; color: #991B1B;">8</div>
                    <div style="font-size: 0.8rem; color: #991B1B; font-weight: 500;">Acción Requerida</div>
                </div>
                <div class="card" style="display: flex; flex-direction: column; gap: 8px;">
                    <div style="color: var(--text-muted); font-size: 0.9rem; font-weight: 500;">CSAT Promedio</div>
                    <div style="font-size: 2.5rem; font-weight: 700; color: #1E40AF;">4.8<span style="font-size: 1.2rem; color: var(--text-muted);">/5</span></div>
                </div>
            </div>
            <div class="card" style="height: 300px; display: flex; align-items: center; justify-content: center; background: #F8FAFC; border: 1px dashed var(--border);">
                <div style="text-align: center; color: var(--text-muted);">
                    <i data-lucide="pie-chart" size="32" style="margin-bottom: 10px;"></i>
                    <p>Espacio reservado para gráfico dinámico (Chart.js)</p>
                </div>
            </div>
        </div>
    </main>
    <script>lucide.createIcons();</script>
</body>
</html>
