# railway.toml — Configuración para Railway.app
# Este archivo le dice a Railway exactamente cómo construir y arrancar la app

[build]
builder = "nixpacks"

[build.buildCommand]
# Instala dependencias y recoge archivos estáticos (CSS, JS, imágenes)
cmd = "pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate --noinput"

[deploy]
startCommand = "gunicorn unidossis_pqrs.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120"
healthcheckPath = "/login/"
healthcheckTimeout = 100
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
