<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error de Sistema - UNIDOSSIS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: linear-gradient(135deg, #FEF2F2 0%, #FFF1F2 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .error-card { background: white; border-radius: 24px; padding: 60px; text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,0.08); max-width: 500px; }
        .error-code { font-size: 6rem; font-weight: 800; color: #dc2626; letter-spacing: -4px; line-height: 1; }
        h2 { font-size: 1.4rem; color: #1e293b; margin-top: 16px; font-weight: 700; }
        p { color: #64748b; font-size: 14px; margin-top: 12px; line-height: 1.6; }
        .btn-back { display: inline-block; margin-top: 28px; padding: 12px 28px; background: #1e3a8a; color: white; text-decoration: none; border-radius: 12px; font-weight: 600; font-size: 14px; transition: all 0.3s; box-shadow: 0 4px 12px rgba(30,58,138,0.3); }
        .btn-back:hover { background: #1e40af; transform: translateY(-2px); box-shadow: 0 8px 20px rgba(30,58,138,0.35); }
    </style>
</head>
<body>
    <div class="error-card">
        <div class="error-code">500</div>
        <h2>Algo no salió como esperábamos.</h2>
        <p>Hemos registrado este error en nuestro sistema interno y el equipo técnico ya fue notificado.</p>
        <a href="/login/" class="btn-back">← Volver al Inicio Seguro</a>
    </div>
</body>
</html>
