{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contraseña Restablecida - Unidossis PQRS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary-color: #2563EB; --bg-gradient: linear-gradient(135deg, #F8FAFC 0%, #EFF6FF 100%); }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background: var(--bg-gradient); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .card {
            background: white; padding: 40px; border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3); width: 100%; max-width: 420px; text-align: center;
        }
        h1 { font-size: 20px; color: #1e293b; margin-bottom: 10px; font-weight: 700; }
        .subtitle { color: #64748b; font-size: 13px; margin-bottom: 25px; line-height: 1.6; }
        .btn {
            display: inline-block; padding: 13px 30px; background: #1e3a8a; color: white; border: none;
            border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer;
            transition: background 0.3s; text-decoration: none; margin-top: 10px;
        }
        .btn:hover { background: #1e40af; }
        .success-icon {
            width: 80px; height: 80px; border-radius: 50%; background: #f0fdf4;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 20px; font-size: 36px; color: #16a34a;
            border: 3px solid #bbf7d0;
        }
    </style>
</head>
<body>
    <div class="card">
        <div style="margin-bottom: 25px;">
            <img src="{% static 'tickets/img/LOGOSVG.svg' %}" alt="Unidossis" style="height: 55px; width: auto;">
        </div>

        <div class="success-icon">
            <i class="fa-solid fa-check"></i>
        </div>

        <h1>¡Contraseña restablecida!</h1>
        <p class="subtitle">
            Su contraseña ha sido actualizada exitosamente.<br>
            Ya puede iniciar sesión con su nueva contraseña.
        </p>

        <a href="{% url 'login' %}" class="btn">
            <i class="fa-solid fa-right-to-bracket"></i> Iniciar sesión
        </a>
    </div>
</body>
</html>
